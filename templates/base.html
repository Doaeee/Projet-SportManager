<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}SportManager{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background: #f6f8fb;
      }
      .page-hero {
        background: linear-gradient(135deg, rgba(13, 110, 253, 0.12), rgba(25, 135, 84, 0.10));
        border: 1px solid rgba(13, 110, 253, 0.12);
      }
      .card-hover {
        transition: transform 0.08s ease-in-out, box-shadow 0.08s ease-in-out;
      }
      .card-hover:hover {
        transform: translateY(-1px);
        box-shadow: 0 0.5rem 1.25rem rgba(0, 0, 0, 0.08);
      }
      .calendar-day {
        min-height: 420px;
      }
      .calendar-event {
        border-left: 4px solid var(--bs-primary);
      }
      .calendar-event.event-full {
        border-left-color: var(--bs-danger);
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    {% include "partials/navbar.html" %}

    <main class="container py-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} mb-3" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
